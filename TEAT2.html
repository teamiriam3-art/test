<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>聖地巡礼マップ</title>

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>

    <!-- Mapbox Search -->
    <script defer src="https://api.mapbox.com/search-js/v1.0.0/web.js"></script>

    <link rel="stylesheet" href="seitijunnreidayo.css">
</head>

<body>

    <!-- 検索バー -->
    <div id="search-container">
        <div id="search-box"></div>
    </div>

    <!-- 地図 -->
    <div id="map"></div>

    <!-- 地図操作ボタン -->
    <div id="menu">

        <button id="currentLocation">
            📍 現在地
        </button>

        <button id="toggle3D">
            🏙️ 3D表示
        </button>

        <button id="resetNorth">
            🧭 北を上
        </button>

    </div>

    <!-- 座標表示 -->
    <div id="coordinateBox">
        <div>緯度：<span id="lat">---</span></div>
        <div>経度：<span id="lng">---</span></div>
    </div>

    <!-- 読み込み中 -->
    <div id="loading">
        地図を読み込み中...
    </div>

    <script src="seitijunnreidayo.js"></script>

</body>

</html>
